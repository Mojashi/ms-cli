name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile ms-cli-darwin-arm64
      - run: bun build src/index.ts --compile --target=bun-darwin-x64 --outfile ms-cli-darwin-x64
      - run: chmod +x ms-cli-*
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ms-cli-*
